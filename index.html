<!DOCTYPE html>
<html>
<head>
    <title>Time-Travel Debugger</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            color: cyan;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .left, .right {
            width: 50%;
            padding: 20px;
        }

        .left {
            border-right: 1px solid #1e293b;
        }

        textarea {
            width: 100%;
            height: 70%;
            background: #020617;
            color: #38bdf8;
            border: 1px solid #1e293b;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            background: cyan;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
        }

        #output {
            background: black;
            height: 70%;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid #1e293b;
        }

        .step {
            color: #22c55e;
            margin-bottom: 5px;
            animation: fadeIn 0.5s ease-in;
        }

        .error {
            color: #ef4444;
            margin-bottom: 5px;
        }

        .highlight {
            background: #1e293b;
            padding: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<header>
    ⏳ Time-Travel Debugger (Visualizer)
</header>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h3>Code Editor</h3>

        <textarea id="codeInput">
int a = 5;
int b = 3;
a = a + 2;
b = b - 1;
        </textarea>

        <br>
        <button onclick="startDebugger()">Run ▶</button>
        <button onclick="nextStep()">Next Step ⏭</button>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Execution Trace</h3>
        <div id="output"></div>
    </div>

</div>

<script>
let lines = [];
let vars = {};
let step = 1;
let currentLine = 0;

function startDebugger() {
    let code = document.getElementById("codeInput").value;
    lines = code.split("\n");

    vars = {};
    step = 1;
    currentLine = 0;

    document.getElementById("output").innerHTML = "";
}

function nextStep() {
    if (currentLine >= lines.length) return;

    let line = lines[currentLine].trim();
    currentLine++;

    if (line === "") return;

    let parts = line.split(" ");
    let outputDiv = document.getElementById("output");

    // Highlight current line visually
    outputDiv.innerHTML += `<div class="highlight">Running: ${line}</div>`;

    // Declaration
    if (parts[0] === "int") {
        let varName = parts[1];
        let value = parseInt(parts[3]);

        vars[varName] = value;

        outputDiv.innerHTML +=
            `<div class="step">Step ${step++} → ${varName} initialized to ${value}</div>`;
    }

    // Assignment
    else {
        let varName = parts[0];
        let var2 = parts[2];
        let op = parts[3];
        let num = parseInt(parts[4]);

        if (!(var2 in vars)) {
            outputDiv.innerHTML +=
                `<div class="error">Error: ${var2} not declared</div>`;
            return;
        }

        let oldValue = vars[varName] || 0;

        if (op === "+") {
            vars[varName] = vars[var2] + num;
        } else if (op === "-") {
            vars[varName] = vars[var2] - num;
        }

        outputDiv.innerHTML +=
            `<div class="step">Step ${step++} → ${varName} changed from ${oldValue} to ${vars[varName]}</div>`;
    }
}
</script>

</body>
</html>
